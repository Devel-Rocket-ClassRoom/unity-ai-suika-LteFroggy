name: "Bug Report"
description: "게임 실행 중 발생한 오류, 크래시, 비정상 동작을 제보합니다."
title: "[BUG] "
labels: ["bug", "todo"]
body:
  - type: input
    id: branch
    attributes:
      label: "작업 브랜치"
      description: "이 이슈에서 사용할 브랜치 이름을 적어주세요."
      placeholder: "fix/10-player-jump-collision"

  - type: textarea
    id: summary
    attributes:
      label: "버그 요약"
      description: "어떤 문제가 발생하는지 한두 문장으로 적어주세요."
      value: "확인 필요"

  - type: textarea
    id: steps
    attributes:
      label: "재현 절차"
      description: "버그를 재현하는 순서를 적어주세요."
      value: |
        1. 확인 필요

  - type: textarea
    id: actual
    attributes:
      label: "실제 결과"
      description: "실제로 발생한 동작, 오류 메시지, 로그를 적어주세요."
      value: "확인 필요"

  - type: textarea
    id: expected
    attributes:
      label: "기대 결과"
      description: "정상이라면 어떻게 동작해야 하는지 적어주세요."
      value: "정상 동작해야 함"

  - type: input
    id: environment
    attributes:
      label: "실행 환경"
      description: "빌드/버전, 플랫폼, OS, 기기 사양, 입력 장치를 적어주세요."
      value: "Unity / Windows / Keyboard"

  - type: dropdown
    id: frequency
    attributes:
      label: "발생 빈도"
      default: 0
      options:
        - "확인 필요"
        - "항상 발생"
        - "자주 발생"
        - "가끔 발생"
        - "한 번만 발생"

  - type: textarea
    id: attachments
    attributes:
      label: "첨부 자료"
      description: "스크린샷, 영상, 로그, 세이브 파일, 프로파일러 결과가 있다면 첨부해주세요."
      value: "없음"
