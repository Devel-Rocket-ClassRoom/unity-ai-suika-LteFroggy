name: "Chore"
description: "빌드, CI/CD, 패키지, 프로젝트 설정 등 개발 환경 작업을 요청합니다."
title: "[CHORE] "
labels: ["chore", "todo"]
body:
  - type: input
    id: branch
    attributes:
      label: "작업 브랜치"
      description: "이 이슈에서 사용할 브랜치 이름을 적어주세요."
      placeholder: "chore/10-unity-build-pipeline"

  - type: textarea
    id: purpose
    attributes:
      label: "작업 목적"
      description: "이 작업이 필요한 이유와 해결하려는 문제를 적어주세요."
      value: "작업 목적 작성"

  - type: dropdown
    id: area
    attributes:
      label: "대상 영역"
      multiple: true
      default: 0
      options:
        - "미정"
        - "빌드/배포"
        - "CI/CD"
        - "패키지/의존성"
        - "프로젝트 설정"
        - "에디터 설정"
        - "기타"

  - type: textarea
    id: tasks
    attributes:
      label: "작업 상세"
      value: |
        - [ ] 설정 확인
        - [ ] 필요한 변경 적용
        - [ ] 빌드 또는 실행 확인

  - type: textarea
    id: impact
    attributes:
      label: "영향 범위"
      description: "런타임, 에디터, 빌드 시간, 플랫폼별 동작에 영향이 있는지 적어주세요."
      value: "없음"

  - type: textarea
    id: verification
    attributes:
      label: "확인 방법"
      description: "어떤 명령, 빌드 타깃, 체크리스트로 완료 여부를 확인할지 적어주세요."
      value: |
        - [ ] Unity 에디터 실행 확인
        - [ ] 필요한 경우 빌드 확인
